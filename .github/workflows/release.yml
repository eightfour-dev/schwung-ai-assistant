name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches module.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION=$(grep '"version"' src/module.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) != module.json ($MODULE_VERSION)"
            exit 1
          fi

      - name: Build tarball
        run: ./scripts/build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ai-assistant-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json on main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git fetch origin main
          git checkout -f main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cat > release.json <<EOF
          {
            "version": "${VERSION}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ai-assistant-module.tar.gz"
          }
          EOF
          git add release.json
          git commit -m "chore: update release.json for ${{ github.ref_name }}" || echo "No changes"
          git push origin main
